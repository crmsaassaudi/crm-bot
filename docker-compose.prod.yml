# Production stack for crm-bot on Node C (DigitalOcean load-test env, 10.104.0.3).
# Run with:  docker compose -f docker-compose.prod.yml --env-file .env.prod <cmd>
#
# Self-contained: own Postgres + Redis + MinIO. App ports published on the VPC IP
# (10.104.0.3) so Node A (crm-api) reaches the viewer; public access goes via nginx 443.
# Build builder/viewer from the root Dockerfile (ARG SCOPE); workflows from its own Dockerfile.

x-app-common: &app-common
  restart: always
  env_file: .env.prod
  networks:
    - crm_bot_net

services:
  crm-bot-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: typebot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - crm_bot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm_bot_net

  crm-bot-redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory-policy", "noeviction"]
    volumes:
      - crm_bot_redis:/data
    networks:
      - crm_bot_net

  crm-bot-minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - crm_bot_minio:/data
    networks:
      - crm_bot_net

  # One-shot: create the bucket and make the /public prefix public (mirror docker-compose.dev.yml)
  crm-bot-createbuckets:
    image: minio/mc
    depends_on:
      - crm-bot-minio
    networks:
      - crm_bot_net
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set minio http://crm-bot-minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      /usr/bin/mc mb --ignore-existing minio/${S3_BUCKET};
      /usr/bin/mc anonymous set public minio/${S3_BUCKET}/public;
      exit 0;
      "

  crm-bot-builder:
    <<: *app-common
    build:
      context: .
      args:
        - SCOPE=builder
    depends_on:
      crm-bot-db:
        condition: service_healthy
    ports:
      - "10.104.0.3:4202:3000"

  crm-bot-viewer:
    <<: *app-common
    build:
      context: .
      args:
        - SCOPE=viewer
    depends_on:
      crm-bot-db:
        condition: service_healthy
    ports:
      - "10.104.0.3:4203:3000"

  crm-bot-workflows:
    <<: *app-common
    build:
      context: .
      dockerfile: apps/workflows/Dockerfile
    depends_on:
      crm-bot-db:
        condition: service_healthy
    ports:
      - "10.104.0.3:3002:3000"

networks:
  crm_bot_net:
    driver: bridge

volumes:
  crm_bot_pg:
  crm_bot_redis:
  crm_bot_minio:
