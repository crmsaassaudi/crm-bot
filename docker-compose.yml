# Production stack for crm-bot on Node C (10.104.0.3).
# Run with:  docker compose -f docker-compose.yml --env-file .env.production <cmd>
#
# Own Postgres. Redis is shared with Node B (10.104.0.5) via REDIS_URL in .env.production, and
# file storage is DigitalOcean Spaces (S3_* in .env.production) — neither runs as a local container.
# App ports published on the VPC IP (10.104.0.3) so Node A (crm-api) reaches the viewer;
# public access goes via nginx 443.
# Build builder/viewer from the root Dockerfile (ARG SCOPE); workflows from its own Dockerfile.

x-app-common: &app-common
  restart: always
  env_file: .env.production
  networks:
    - crm_bot_net

services:
  crm-bot-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: typebot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - crm_bot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm_bot_net

  crm-bot-builder:
    <<: *app-common
    build:
      context: .
      args:
        - SCOPE=builder
    depends_on:
      crm-bot-db:
        condition: service_healthy
    ports:
      - "10.104.0.3:4202:3000"

  crm-bot-viewer:
    <<: *app-common
    build:
      context: .
      args:
        - SCOPE=viewer
    depends_on:
      crm-bot-db:
        condition: service_healthy
    ports:
      - "10.104.0.3:4203:3000"

  crm-bot-workflows:
    <<: *app-common
    build:
      context: .
      dockerfile: apps/workflows/Dockerfile
    depends_on:
      crm-bot-db:
        condition: service_healthy
    ports:
      - "10.104.0.3:3002:3000"

networks:
  crm_bot_net:
    driver: bridge

volumes:
  crm_bot_pg:
